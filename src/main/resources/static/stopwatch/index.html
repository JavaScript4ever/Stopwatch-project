<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stopwatch</title>
    <link rel="icon" type="image/x-icon" href="../img/stopwatchicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Science+Gothic:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="main-container">
        <h1>Stopwatch</h1>
        <h5>by PickleCorporation</h5>
        <div class="stopwatch">
            <div class="timer" id="timer">

            </div>
            <div class="control">
                <button type="button" class="control-btn" id="start-btn">Start</button>
                <button type="button" class="control-btn" id="stop-btn">Stop</button>
                <button type="button" class="control-btn" id="reset-btn">Reset</button>
            </div>
        </div>
        <div class="rating">
            <h4 id="toRatePage">If you have anything to say about the app, please leave a review!</h4>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
